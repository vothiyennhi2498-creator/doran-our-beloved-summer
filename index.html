<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Doran: Our Beloved Summer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="hero">
    <h1>DORAN</h1>
    <h2>Our Beloved Summer</h2>
    <p>July • Summer • Doran</p>
  </div>

  <div class="game">
    <input id="username" type="text" placeholder="Enter your Threads name">
    <button id="drawBtn">🎁 DRAW</button>
    <div id="giftBox" class="gift-box"></div>
    <div id="resultCard" class="card"></div>
    <div id="remaining">
      <h3>🎁 Gifts Remaining</h3>
      <ul id="remainingList"></ul>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
